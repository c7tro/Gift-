<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الصندوق ليما ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* الصفحة الأولى - اللعبة */
        #game-screen {
            width: 100vw;
            height: 100vh;
            background-image: url('https://i.ibb.co/mC2dbzP9/IMG-7490.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s ease;
        }

        #box {
            position: absolute;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            user-select: none;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* الصفحة الثانية - الرسالة */
        #win-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background-image: url('https://i.ibb.co/nN9Yk7hs/IMG-7491.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .message {
            background: rgba(0, 0, 0, 0.65);
            padding: 30px 40px;
            border-radius: 20px;
            max-width: 90%;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .message h1 {
            font-size: 2.2rem;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #000;
        }

        .message p {
            font-size: 1.4rem;
            line-height: 1.8;
            color: #fff;
        }

        .input-area {
            width: 90%;
            max-width: 600px;
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        textarea {
            width: 100%;
            height: 180px;
            border: none;
            outline: none;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            padding: 15px;
            border-radius: 12px;
            resize: none;
        }

        .small-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 45px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <!-- شاشة اللعبة -->
    <div id="game-screen">
        <img id="box" src="https://i.ibb.co/Gv4WhCgZ/IMG-7493.jpg" alt="الصندوق">
    </div>

    <!-- شاشة الفوز والرسالة -->
    <div id="win-screen">
        <div class="message">
            <h1>كيف حالك يما؟ ❤️</h1>
            <p>
                هذا موقع ثاني سويته عشانك<br><br>
                اكتبي ايش جاي على بالك يما<br><br>
                ابن الغالي قاسم<br>
                وسلمي على رحمه ورغد
            </p>
        </div>

        <div class="input-area">
            <textarea id="message-input" placeholder="اكتبي رسالتك هنا يما... ❤️"></textarea>
        </div>

        <img src="https://i.ibb.co/60j1ZR7p/IMG-7488.jpg" class="small-box" alt="صندوق صغير">
    </div>

    <script>
        const box = document.getElementById('box');
        const gameScreen = document.getElementById('game-screen');
        const winScreen = document.getElementById('win-screen');
        
        let attempts = 0;
        const maxAttempts = 8;
        
        // أحجام الصندوق (تناقص تدريجياً)
        const sizes = [320, 260, 210, 170, 135, 105, 80, 55];
        
        // وظيفة لتوليد موقع عشوائي داخل الشاشة
        function getRandomPosition() {
            const maxX = window.innerWidth - 100;
            const maxY = window.innerHeight - 100;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            return {
                left: Math.max(50, Math.min(randomX, maxX - 50)),
                top: Math.max(50, Math.min(randomY, maxY - 50))
            };
        }

        // بداية اللعبة
        function startGame() {
            attempts = 0;
            box.style.width = sizes[0] + 'px';
            box.style.height = 'auto';
            
            const pos = getRandomPosition();
            box.style.left = pos.left + 'px';
            box.style.top = pos.top + 'px';
        }

        // عند الضغط على الصندوق
        box.addEventListener('click', function() {
            attempts++;
            
            if (attempts >= maxAttempts) {
                // الفوز - الانتقال للصفحة الثانية
                gameScreen.style.opacity = '0';
                
                setTimeout(() => {
                    gameScreen.style.display = 'none';
                    winScreen.style.display = 'flex';
                    winScreen.style.opacity = '1';
                }, 600);
                
                return;
            }
            
            // تغيير الحجم والمكان
            const newSize = sizes[attempts];
            box.style.width = newSize + 'px';
            
            const newPos = getRandomPosition();
            box.style.left = newPos.left + 'px';
            box.style.top = newPos.top + 'px';
            
            // تأثير بسيط عند الضغط
            box.style.transform = 'scale(0.85)';
            setTimeout(() => {
                box.style.transform = 'scale(1)';
            }, 150);
        });

        // بدء اللعبة عند تحميل الصفحة
        window.onload = function() {
            startGame();
        };

        // جعل الرسالة تظهر في الموقع (للعرض فقط)
        const textarea = document.getElementById('message-input');
        textarea.addEventListener('input', function() {
            // يمكنك إضافة حفظ أو عرض هنا إذا أردت في المستقبل
            console.log('رسالة يما: ' + this.value);
        });
    </script>
</body>
</html>
