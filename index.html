<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Message Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}

/* السماء */
#game {
  width: 100vw;
  height: 100vh;
  position: relative;
  background: linear-gradient(#7ec0ee, #cceeff);
}

/* الشمس */
.sun {
  position: absolute;
  top: 40px;
  right: 60px;
  width: 80px;
  height: 80px;
  background: #ffd966;
  box-shadow: 0 0 40px #ffd966;
}

/* سحب */
.cloud {
  position: absolute;
  width: 120px;
  height: 60px;
  background: white;
  opacity: 0.8;
  animation: moveClouds 30s linear infinite;
}
@keyframes moveClouds {
  from { transform: translateX(-200px); }
  to { transform: translateX(120vw); }
}

/* أرض pixel وردية */
.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40%;
  background:
    repeating-linear-gradient(0deg,#ff9bb0 0px,#ff9bb0 32px,#ffb6c1 32px,#ffb6c1 64px),
    repeating-linear-gradient(90deg,#ff9bb0 0px,#ff9bb0 32px,#ffb6c1 32px,#ffb6c1 64px);
}

/* شجرة pixel */
.tree {
  position: absolute;
  bottom: 40%;
}
.trunk {
  width: 20px;
  height: 60px;
  background: #6b3e26;
  margin: auto;
}
.leaves {
  width: 80px;
  height: 60px;
  background:
    repeating-linear-gradient(45deg,#2ecc71,#2ecc71 10px,#27ae60 10px,#27ae60 20px);
}

/* الصندوق */
#box {
  position: absolute;
  width: 130px;
  height: 130px;
  background:
    repeating-linear-gradient(45deg,#8b5a2b,#8b5a2b 10px,#a66b3d 10px,#a66b3d 20px);
  border: 4px solid #5c3a1a;
  cursor: pointer;
  transition: transform 0.2s;
}

/* انيميشن ضغط */
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

#page2 {
  display: none;
  width: 100vw;
  height: 100vh;
  background: #111;
  color: white;
  text-align: center;
  padding: 40px;
}

input, button {
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="game">
  <div class="sun"></div>

  <div class="cloud" style="top:50px;"></div>
  <div class="cloud" style="top:120px; animation-duration:40s;"></div>

  <div class="ground"></div>

  <div class="tree" style="left:15%">
    <div class="leaves"></div>
    <div class="trunk"></div>
  </div>

  <div class="tree" style="left:70%">
    <div class="leaves"></div>
    <div class="trunk"></div>
  </div>

  <div id="box"></div>
</div>

<div id="page2">
  <h2>
  السلام عليكم كيف حالك امي الغاليه مشتاقلك يما وإن شاء الله برجع باسرع وقت سويت هذا الموقع من الزهق ايش رأيك فيه يما
  </h2>

  <input type="text" id="msgInput" placeholder="اكتب رسالتك">
  <br>
  <button onclick="addMessage()">إرسال</button>

  <div id="messages"></div>
</div>

<audio id="clickSound" src="https://www.myinstants.com/media/sounds/minecraft_click.mp3"></audio>

<script>
let box = document.getElementById("box");
let clicks = 0;
let sound = document.getElementById("clickSound");

function moveBox() {
  let x = Math.random() * (window.innerWidth - 150);
  let y = Math.random() * (window.innerHeight - 150);
  box.style.left = x + "px";
  box.style.top = y + "px";
}

moveBox();

box.onclick = () => {
  clicks++;
  sound.play();

  box.style.animation = "pop 0.2s";

  if (clicks < 3) {
    moveBox();
    box.style.transform = `scale(${1 - clicks * 0.2})`;
  } else {
    document.getElementById("game").style.display = "none";
    document.getElementById("page2").style.display = "block";
  }

  setTimeout(()=> box.style.animation="",200);
};

function addMessage() {
  let input = document.getElementById("msgInput");
  let text = input.value;

  if (!text.trim()) return;

  let div = document.createElement("div");
  div.textContent = text;

  document.getElementById("messages").appendChild(div);

  localStorage.setItem("msgs",
    (localStorage.getItem("msgs") || "") + "||" + text
  );

  input.value = "";
}

window.onload = () => {
  let saved = localStorage.getItem("msgs");
  if (saved) {
    saved.split("||").forEach(m=>{
      if(m){
        let d = document.createElement("div");
        d.textContent = m;
        document.getElementById("messages").appendChild(d);
      }
    });
  }
};
</script>

</body>
</html>
