<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الرسالة</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}

/* الصفحة الأولى */
#game {
  width: 100vw;
  height: 100vh;
  position: relative;
  background: url("https://i.ibb.co/mC2dbzP9/IMG-7490.jpg") no-repeat center/cover;
}

/* صور صغيرة */
.decor {
  position: absolute;
  width: 60px;
  opacity: 0.9;
}

/* الصندوق */
#box {
  position: absolute;
  width: 120px;
  height: 120px;
  background: url("https://i.ibb.co/TqcW4Ctn/IMG-7492.jpg") no-repeat center/contain;
  touch-action: manipulation;
}

/* انيميشن */
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* الصفحة الثانية */
#page2 {
  display: none;
  width: 100vw;
  height: 100vh;
  background: url("https://i.ibb.co/nN9Yk7hs/IMG-7491.jpg") no-repeat center/cover;
  color: white;
  padding: 20px;
  box-sizing: border-box;
  overflow-y: auto;
  text-align: center;
  backdrop-filter: brightness(0.8);
}

h2 {
  font-size: 18px;
  line-height: 1.6;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
}

#messages div {
  margin-top: 10px;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="game">

  <!-- ديكور -->
  <img src="https://i.ibb.co/60j1ZR7p/IMG-7488.jpg" class="decor" style="top:10%; left:10%;">
  <img src="https://i.ibb.co/v6638VyQ/IMG-7489.jpg" class="decor" style="bottom:20%; right:10%;">

  <!-- الصندوق -->
  <div id="box"></div>

</div>

<div id="page2">
  <h2>
  السلام عليكم كيف حالك امي الغاليه مشتاقلك يما وإن شاء الله برجع باسرع وقت سويت هذا الموقع من الزهق ايش رأيك فيه يما
  </h2>

  <input type="text" id="msgInput" placeholder="اكتب رسالتك">
  <button onclick="addMessage()">إرسال</button>

  <div id="messages"></div>
</div>

<audio id="clickSound" src="https://www.myinstants.com/media/sounds/minecraft_click.mp3"></audio>

<script>
let box = document.getElementById("box");
let clicks = 0;
let sound = document.getElementById("clickSound");

function moveBox() {
  let maxX = window.innerWidth - box.offsetWidth;
  let maxY = window.innerHeight - box.offsetHeight;

  box.style.left = Math.random() * maxX + "px";
  box.style.top = Math.random() * maxY + "px";
}

moveBox();

function handleClick() {
  clicks++;
  sound.currentTime = 0;
  sound.play();

  box.style.animation = "pop 0.2s";

  if (clicks < 3) {
    moveBox();
    box.style.transform = `scale(${1 - clicks * 0.15})`;
  } else {
    document.getElementById("game").style.display = "none";
    document.getElementById("page2").style.display = "block";
  }

  setTimeout(()=> box.style.animation="",200);
}

box.addEventListener("click", handleClick);
box.addEventListener("touchstart", handleClick);

function addMessage() {
  let input = document.getElementById("msgInput");
  let text = input.value;

  if (!text.trim()) return;

  let div = document.createElement("div");
  div.textContent = text;

  document.getElementById("messages").appendChild(div);

  localStorage.setItem("msgs",
    (localStorage.getItem("msgs") || "") + "||" + text
  );

  input.value = "";
}

window.onload = () => {
  let saved = localStorage.getItem("msgs");
  if (saved) {
    saved.split("||").forEach(m=>{
      if(m){
        let d = document.createElement("div");
        d.textContent = m;
        document.getElementById("messages").appendChild(d);
      }
    });
  }
};
</script>

</body>
</html>
