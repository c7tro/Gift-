<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPID BH PRO | العصر الجديد للنظافة والفخامة</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #e63946;
            --gold: #c5a028;
            --dark: #070708;
            --card-bg: #111113;
            --fb-blue: #1877f2;
            --fb-bubble: #242526;
        }

        body { font-family: 'Tajawal', sans-serif; background-color: var(--dark); color: #fff; scroll-behavior: smooth; }

        /* --- نسيج الخلفية الفخم --- */
        .premium-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.02) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* --- Header Glow --- */
        .glass-header {
            background: rgba(7, 7, 8, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(230, 57, 70, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* --- Product Card Enhancements --- */
        .p-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .p-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(230, 57, 70, 0.15);
        }

        .badge-hot {
            position: absolute;
            top: 20px;
            right: -35px;
            background: var(--primary);
            color: white;
            padding: 5px 40px;
            transform: rotate(45deg);
            font-size: 10px;
            font-weight: 900;
            z-index: 10;
        }

        /* --- Facebook Realistic Style --- */
        .fb-bubble {
            background: var(--fb-bubble);
            border-radius: 18px;
            padding: 12px 16px;
            position: relative;
        }
        .fb-bubble::after {
            content: '';
            position: absolute;
            top: 10px;
            right: -8px;
            border-width: 8px 0 8px 8px;
            border-style: solid;
            border-color: transparent transparent transparent var(--fb-bubble);
        }

        /* --- Buttons --- */
        .btn-main {
            background: linear-gradient(90deg, var(--primary), #b91c1c);
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.3);
            transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* --- Custom Tabs --- */
        .tab-btn.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }
    </style>
</head>
<body class="premium-bg">

<nav class="fixed top-0 w-full z-[5000] py-4 px-6 transition-all duration-300" id="main-nav">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-2xl hover:text-red-600"><i class="fas fa-bars"></i></button>
            <div class="text-2xl font-black italic tracking-tighter font-['Montserrat']">
                RAPID <span class="text-red-600">PRO</span>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="hidden md:flex gap-6 text-xs font-bold uppercase tracking-widest text-gray-400">
                <a href="#store" class="hover:text-red-600">المتجر</a>
                <a href="#reviews" class="hover:text-red-600">آراء العملاء</a>
            </div>
            <button onclick="toggleCart()" class="relative p-2 bg-white/5 rounded-full border border-white/10">
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                <i class="fas fa-shopping-cart text-xl"></i>
            </button>
        </div>
    </div>
</nav>

<section class="relative h-[90vh] flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 z-0">
        <img src="https://i.ibb.co/9kCQjSsy/IMG-7517.jpg" class="w-full h-full object-cover scale-110 brightness-50" id="hero-img">
    </div>
    <div class="relative z-10 text-center px-4 animate__animated animate__fadeIn">
        <span class="text-gold font-bold tracking-[10px] uppercase text-sm mb-4 block">Abu Dhabi's Finest</span>
        <h1 class="text-6xl md:text-9xl font-black italic mb-6 leading-none">RAPID BH<br><span class="text-red-600">PRO</span></h1>
        <p class="text-gray-300 max-w-xl mx-auto mb-10 text-lg">نجمع لك بين عبير العطور الفاخرة وقوة التنظيف الصناعية في مكان واحد.</p>
        <div class="flex flex-wrap justify-center gap-4">
            <a href="#store" class="btn-main px-10 py-5 rounded-full font-black text-lg">تسوق الآن</a>
            <a href="https://wa.me/971508851549" class="bg-white/10 backdrop-blur-md border border-white/20 px-10 py-5 rounded-full font-black text-lg hover:bg-white/20">تواصل مباشر</a>
        </div>
    </div>
</section>

<section id="store" class="py-32 px-6">
    <div class="max-w-7xl mx-auto text-center">
        <h2 class="text-5xl font-black italic mb-16">تشكيلة <span class="text-red-600">RAPID</span></h2>
        
        <div class="flex justify-center gap-8 mb-20 border-b border-white/5 text-lg font-bold">
            <button onclick="filterProducts('all')" class="tab-btn active pb-4 px-4" id="btn-all">الكل</button>
            <button onclick="filterProducts('fragrance')" class="tab-btn pb-4 px-4" id="btn-fragrance">المعطرات</button>
            <button onclick="filterProducts('cleaner')" class="tab-btn pb-4 px-4" id="btn-cleaner">المنظفات</button>
        </div>

        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 text-right">
            </div>
    </div>
</section>

<section id="reviews" class="py-32 bg-zinc-950/50">
    <div class="max-w-4xl mx-auto px-6">
        <div class="flex items-center justify-between mb-16">
            <h3 class="text-4xl font-black italic">ماذا يقول <span class="text-blue-500">الناس؟</span></h3>
            <div class="flex items-center gap-2 text-green-500 font-bold animate-pulse">
                <i class="fas fa-circle text-[8px]"></i> 14 متصل الآن
            </div>
        </div>

        <div class="bg-zinc-900 border border-white/5 rounded-[40px] p-8 md:p-12 shadow-2xl">
            <div class="flex gap-4 mb-16 border-b border-white/5 pb-10">
                <div class="w-12 h-12 rounded-full bg-zinc-800 flex items-center justify-center text-xl text-gray-500"><i class="fas fa-user"></i></div>
                <div class="flex-1 space-y-4">
                    <input type="text" id="rev-name" placeholder="اسمك الكريم" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition">
                    <textarea id="rev-text" placeholder="شاركنا تجربتك مع منتجاتنا..." rows="3" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition resize-none"></textarea>
                    <button onclick="submitReview()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-xl transition shadow-lg shadow-blue-900/20">نشر التعليق</button>
                </div>
            </div>

            <div id="reviews-list" class="space-y-10">
                </div>
        </div>
    </div>
</section>

<div id="cart-panel" class="fixed top-0 -right-[450px] w-full max-w-[420px] h-full bg-zinc-900 z-[6000] shadow-[-20px_0_50px_rgba(0,0,0,0.8)] transition-all duration-500 flex flex-col p-8 border-l border-white/10">
    <div class="flex justify-between items-center mb-10">
        <h2 class="text-3xl font-black italic">طلباتك <i class="fas fa-shopping-bag text-red-600 ml-2"></i></h2>
        <button onclick="toggleCart()" class="text-4xl hover:text-red-600">&times;</button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto space-y-6">
        </div>
    <div class="pt-8 border-t border-white/10">
        <div class="flex justify-between text-2xl font-black mb-6">
            <span>الإجمالي:</span>
            <span id="cart-total" class="text-gold">0 AED</span>
        </div>
        <button onclick="openCheckout()" class="w-full btn-main py-6 rounded-3xl font-black text-xl">تأكيد الطلب عبر واتساب</button>
    </div>
</div>

<div id="p-modal" class="fixed inset-0 z-[7000] bg-black/95 hidden items-center justify-center p-4 backdrop-blur-xl">
    </div>

<script>
    const DATA = {
        products: [
            { id: 1, type: 'fragrance', name: "معطر عود ملكي", price: 15, img: "https://i.ibb.co/9mSytFrM/IMG-7278.jpg", hot: true, desc: "مستخلص من أرقى زيوت العود الكمبودي، ثبات يدوم 48 ساعة على الأقمشة." },
            { id: 2, type: 'fragrance', name: "الفندقي الفاخر", price: 15, img: "https://i.ibb.co/YF8sD3p2/IMG-7285.jpg", hot: false, desc: "رائحة الفنادق العالمية 5 نجوم، مزيج من الفانيلا والأخشاب العطرية." },
            { id: 3, type: 'fragrance', name: "زهور بيضاء نقيّة", price: 15, img: "https://i.ibb.co/V0nJW4CY/IMG-7280.jpg", hot: false, desc: "انتعاش الطبيعة في منزلك، مثالي لغرف النوم والمجالس." },
            { id: 4, type: 'cleaner', name: "مزيل الدهون الفتاك", price: 15, img: "https://i.ibb.co/KzxfrNkC/IMG-7281.jpg", hot: true, desc: "تركيبة RAPID الخاصة لإذابة أصعب الدهون المحروقة في ثوانٍ." },
            { id: 5, type: 'cleaner', name: "مزيل البقع BH99", price: 15, img: "https://i.ibb.co/3mcb1trt/IMG-7284.jpg", hot: false, desc: "قوة مضاعفة لإزالة الحبر، الزيت، والدم من السجاد والكنب." },
            { id: 6, type: 'cleaner', name: "منظف التكلسات", price: 20, img: "https://i.ibb.co/9kCQjSsy/IMG-7517.jpg", hot: true, desc: "منتجنا الجديد لإزالة التكلسات الجيرية من السيراميك والمطابخ." },
            { id: 7, type: 'all', name: "بوكس التوفير (12 عبوة)", price: 150, img: "https://i.ibb.co/3mcb1trt/IMG-7284.jpg", hot: true, isBox: true, desc: "وفر 30 درهم واختر تشكيلتك الخاصة من جميع المنتجات." }
        ],
        reviews: [
            { name: "خالد سعيد", text: "يا جماعة العود الملكي ريحته خنينة وما تمزح، والثبات عجيب! طلبت البوكس والحمدلله توفقت.", time: "٢ د", likes: 12, initial: 'K', color: 'bg-emerald-600' },
            { name: "Sarah Williams", text: "Perfect quality. The 'Luxury Fragrance' smells exactly like 5-star hotels in Dubai.", time: "١٥ د", likes: 8, initial: 'S', color: 'bg-blue-600' },
            { name: "عفراء الهاملي", text: "مزيل الدهون جربته على عيون الفرن وتفاجأت، ذوب الدهون في ثواني. المنتج يبيض الوجه.", time: "٤٠ د", likes: 24, initial: 'ع', color: 'bg-red-600' }
        ]
    };

    let cart = [];

    // --- Initialization ---
    function init() {
        renderProducts('all');
        renderReviews();
        setupScroll();
    }

    // --- Core Functions ---
    function renderProducts(filter) {
        const grid = document.getElementById('products-grid');
        const items = filter === 'all' ? DATA.products : DATA.products.filter(p => p.type === filter || p.isBox);
        
        grid.innerHTML = items.map(p => `
            <div class="p-card rounded-[40px] p-6 animate__animated animate__fadeIn">
                ${p.hot ? '<div class="badge-hot">الأكثر طلباً</div>' : ''}
                <div class="relative h-72 rounded-[30px] overflow-hidden mb-6 bg-black">
                    <img src="${p.img}" class="w-full h-full object-cover hover:scale-110 transition duration-700">
                    <div class="absolute bottom-4 right-4 bg-red-600 px-4 py-2 rounded-xl font-black shadow-lg">
                        ${p.price} AED
                    </div>
                </div>
                <h4 class="text-2xl font-black mb-3">${p.name}</h4>
                <p class="text-gray-500 text-sm mb-6 line-clamp-2">${p.desc}</p>
                <div class="flex gap-3">
                    <button onclick="addToCart(${p.id})" class="flex-1 btn-main py-4 rounded-2xl font-bold flex items-center justify-center gap-2 text-sm">
                        <i class="fas fa-cart-plus"></i> إضافة للسلة
                    </button>
                    <button onclick="showDetails(${p.id})" class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center hover:bg-white/10 transition">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="mt-4 text-[10px] text-gray-600 font-bold flex items-center gap-2">
                    <i class="fas fa-shopping-bag text-green-600"></i> تم شراءه 14 مرة اليوم
                </div>
            </div>
        `).join('');
    }

    function filterProducts(type) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${type}`).classList.add('active');
        renderProducts(type);
    }

    function addToCart(id) {
        const p = DATA.products.find(x => x.id === id);
        const existing = cart.find(item => item.id === id);
        if(existing) existing.qty++; else cart.push({...p, qty: 1});
        updateCart();
        toast(`${p.name} أضيف للسلة!`);
    }

    function updateCart() {
        const list = document.getElementById('cart-items');
        let total = 0;
        let count = 0;
        list.innerHTML = cart.map((item, idx) => {
            total += (item.price * item.qty);
            count += item.qty;
            return `
                <div class="flex gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover">
                    <div class="flex-1">
                        <h5 class="font-bold text-sm">${item.name}</h5>
                        <div class="flex justify-between items-center mt-2">
                            <div class="flex items-center gap-3 bg-black rounded-lg px-2">
                                <button onclick="changeQty(${idx}, -1)" class="text-red-500">-</button>
                                <span class="text-xs font-bold">${item.qty}</span>
                                <button onclick="changeQty(${idx}, 1)" class="text-green-500">+</button>
                            </div>
                            <span class="text-gold font-black text-sm">${item.price * item.qty} AED</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('cart-total').innerText = `${total} AED`;
        document.getElementById('cart-count').innerText = count;
    }

    function changeQty(idx, delta) {
        cart[idx].qty += delta;
        if(cart[idx].qty <= 0) cart.splice(idx, 1);
        updateCart();
    }

    // --- Facebook Reviews Logic ---
    function renderReviews() {
        const list = document.getElementById('reviews-list');
        list.innerHTML = DATA.reviews.map(r => `
            <div class="flex gap-4 items-start animate__animated animate__fadeInUp text-right">
                <div class="w-12 h-12 rounded-full ${r.color || 'bg-zinc-700'} flex items-center justify-center font-black text-white flex-shrink-0 shadow-lg">
                    ${r.initial || r.name.charAt(0)}
                </div>
                <div class="flex-1">
                    <div class="fb-bubble shadow-xl">
                        <div class="font-black text-white text-sm mb-1">${r.name}</div>
                        <p class="text-gray-200 text-sm leading-relaxed">${r.text}</p>
                    </div>
                    <div class="flex items-center gap-6 mt-2 mr-2 text-[11px] font-bold text-gray-500">
                        <button class="hover:text-blue-500 transition">أعجبني</button>
                        <button class="hover:text-blue-500 transition">رد</button>
                        <span>${r.time}</span>
                        <div class="flex items-center gap-1 bg-zinc-800 px-2 py-0.5 rounded-full border border-white/5">
                            <i class="fas fa-thumbs-up text-blue-500 text-[10px]"></i>
                            <span class="text-white">${r.likes}</span>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function submitReview() {
        const name = document.getElementById('rev-name').value;
        const text = document.getElementById('rev-text').value;
        if(!name || !text) return;
        DATA.reviews.unshift({ name, text, time: 'الآن', likes: 0, initial: name.charAt(0), color: 'bg-red-600' });
        renderReviews();
        document.getElementById('rev-name').value = '';
        document.getElementById('rev-text').value = '';
        toast("شكراً لمشاركتنا رأيك!");
    }

    // --- Helpers ---
    function toggleSidebar() { /* Sidebar logic */ }
    function toggleCart() {
        const p = document.getElementById('cart-panel');
        p.style.right = p.style.right === '0px' ? '-450px' : '0px';
    }
    function openCheckout() {
        if(cart.length === 0) return toast("السلة فارغة!");
        let msg = "مرحباً RAPID BH PRO، أريد طلب:\n";
        cart.forEach(i => msg += `- ${i.name} (${i.qty} حبة)\n`);
        msg += `الإجمالي: ${document.getElementById('cart-total').innerText}`;
        window.open(`https://wa.me/971508851549?text=${encodeURIComponent(msg)}`);
    }
    function setupScroll() {
        window.onscroll = () => {
            const nav = document.getElementById('main-nav');
            window.scrollY > 100 ? nav.classList.add('glass-header') : nav.classList.remove('glass-header');
        };
    }
    function toast(txt) {
        const t = document.createElement('div');
        t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-red-600 px-8 py-4 rounded-2xl font-black z-[10000] animate__animated animate__fadeInUp shadow-2xl";
        t.innerText = txt;
        document.body.appendChild(t);
        setTimeout(() => { t.classList.replace('animate__fadeInUp', 'animate__fadeOutDown'); setTimeout(() => t.remove(), 500); }, 3000);
    }

    init();
</script>

</body>
</html>
