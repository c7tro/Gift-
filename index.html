<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Minecraft Message Mobile</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}

/* الخلفية */
#game {
  width: 100vw;
  height: 100vh;
  position: relative;
  background: linear-gradient(#7ec0ee, #cceeff);
}

/* الشمس */
.sun {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  background: #ffd966;
  box-shadow: 0 0 30px #ffd966;
}

/* أرض */
.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 45%;
  background:
    repeating-linear-gradient(0deg,#ff9bb0 0px,#ff9bb0 24px,#ffb6c1 24px,#ffb6c1 48px),
    repeating-linear-gradient(90deg,#ff9bb0 0px,#ff9bb0 24px,#ffb6c1 24px,#ffb6c1 48px);
}

/* شجر */
.tree {
  position: absolute;
  bottom: 45%;
}
.trunk {
  width: 14px;
  height: 40px;
  background: #6b3e26;
  margin: auto;
}
.leaves {
  width: 60px;
  height: 40px;
  background:
    repeating-linear-gradient(45deg,#2ecc71,#2ecc71 8px,#27ae60 8px,#27ae60 16px);
}

/* الصندوق (أكبر للمس) */
#box {
  position: absolute;
  width: 140px;
  height: 140px;
  background:
    repeating-linear-gradient(45deg,#8b5a2b,#8b5a2b 10px,#a66b3d 10px,#a66b3d 20px);
  border: 4px solid #5c3a1a;
  border-radius: 10px;
  touch-action: manipulation;
}

/* انيميشن */
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* الصفحة الثانية */
#page2 {
  display: none;
  width: 100vw;
  height: 100vh;
  background: #111;
  color: white;
  padding: 20px;
  box-sizing: border-box;
  overflow-y: auto;
}

h2 {
  font-size: 18px;
  line-height: 1.6;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin-top: 15px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
}

#messages div {
  margin-top: 10px;
  padding: 10px;
  background: #222;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="game">
  <div class="sun"></div>
  <div class="ground"></div>

  <div class="tree" style="left:10%">
    <div class="leaves"></div>
    <div class="trunk"></div>
  </div>

  <div class="tree" style="left:70%">
    <div class="leaves"></div>
    <div class="trunk"></div>
  </div>

  <div id="box"></div>
</div>

<div id="page2">
  <h2>
  السلام عليكم كيف حالك امي الغاليه مشتاقلك يما وإن شاء الله برجع باسرع وقت سويت هذا الموقع من الزهق ايش رأيك فيه يما
  </h2>

  <input type="text" id="msgInput" placeholder="اكتب رسالتك">
  <button onclick="addMessage()">إرسال</button>

  <div id="messages"></div>
</div>

<audio id="clickSound" src="https://www.myinstants.com/media/sounds/minecraft_click.mp3"></audio>

<script>
let box = document.getElementById("box");
let clicks = 0;
let sound = document.getElementById("clickSound");

function moveBox() {
  let maxX = window.innerWidth - box.offsetWidth;
  let maxY = window.innerHeight - box.offsetHeight;

  let x = Math.random() * maxX;
  let y = Math.random() * maxY;

  box.style.left = x + "px";
  box.style.top = y + "px";
}

moveBox();

/* دعم لمس + كليك */
function handleClick() {
  clicks++;
  sound.currentTime = 0;
  sound.play();

  box.style.animation = "pop 0.2s";

  if (clicks < 3) {
    moveBox();
    box.style.transform = `scale(${1 - clicks * 0.15})`;
  } else {
    document.getElementById("game").style.display = "none";
    document.getElementById("page2").style.display = "block";
  }

  setTimeout(()=> box.style.animation="",200);
}

box.addEventListener("click", handleClick);
box.addEventListener("touchstart", handleClick);

/* رسائل */
function addMessage() {
  let input = document.getElementById("msgInput");
  let text = input.value;

  if (!text.trim()) return;

  let div = document.createElement("div");
  div.textContent = text;
  document.getElementById("messages").appendChild(div);

  localStorage.setItem("msgs",
    (localStorage.getItem("msgs") || "") + "||" + text
  );

  input.value = "";
}

window.onload = () => {
  let saved = localStorage.getItem("msgs");
  if (saved) {
    saved.split("||").forEach(m=>{
      if(m){
        let d = document.createElement("div");
        d.textContent = m;
        document.getElementById("messages").appendChild(d);
      }
    });
  }
};
</script>

</body>
</html>
