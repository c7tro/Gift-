<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الصندوق الخاصة بيما ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            touch-action: manipulation;
        }

        /* شاشة اللعبة */
        #game-screen {
            width: 100vw;
            height: 100vh;
            background-image: url('https://i.ibb.co/mC2dbzP9/IMG-7490.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease;
        }

        #box {
            position: absolute;
            cursor: pointer;
            transition: all 0.45s cubic-bezier(0.68, -0.4, 0.27, 1.4);
            user-select: none;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            overflow: hidden;
        }

        /* تعليمات بسيطة في الأعلى */
        .instructions {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1.05rem;
            text-align: center;
            z-index: 20;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            max-width: 85%;
        }

        /* شاشة الرسالة بعد الفوز */
        #win-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background-image: url('https://i.ibb.co/nN9Yk7hs/IMG-7491.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .message-container {
            background: rgba(255, 255, 255, 0.92);
            color: #333;
            padding: 35px 30px;
            border-radius: 24px;
            max-width: 92%;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .message-container h1 {
            font-size: 1.85rem;
            color: #5c4033;
            margin-bottom: 18px;
            line-height: 1.4;
        }

        .message-container p {
            font-size: 1.22rem;
            line-height: 1.85;
            color: #444;
            margin-bottom: 25px;
        }

        .input-container {
            width: 100%;
            background: #fff;
            border: 2px solid #d4b89e;
            border-radius: 18px;
            padding: 15px;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 160px;
            border: none;
            outline: none;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            line-height: 1.7;
            color: #333;
            resize: none;
            padding: 10px;
        }

        textarea::placeholder {
            color: #888;
        }

        /* الصندوق الصغير الزينة */
        .small-box {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 52px;
            opacity: 0.85;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        /* تأثير لمس لطيف */
        #box:active {
            transform: scale(0.88) !important;
        }
    </style>
</head>
<body>

    <!-- شاشة اللعبة -->
    <div id="game-screen">
        <div class="instructions">
            اضغطي على الصندوق ✨<br>
            كل مرة يروح مكان ثاني ويصغر
        </div>
        <img id="box" src="https://i.ibb.co/Gv4WhCgZ/IMG-7493.jpg" alt="صندوق">
    </div>

    <!-- شاشة الرسالة بعد 8 محاولات -->
    <div id="win-screen">
        <div class="message-container">
            <h1>كيف حالك يما؟ ❤️</h1>
            <p>
                هذا موقع ثاني سويته عشانك<br><br>
                ايش رأيك فيه؟<br>
                اكتبي ايش جاي على بالك يما
            </p>
            <p style="font-size:1.15rem; margin-top:15px; color:#5c4033;">
                ابنك الغالي قاسم<br>
                وسلمي على رحمه ورغد
            </p>
        </div>

        <div class="input-container">
            <textarea id="message-input" placeholder="اكتبي رسالتك هنا يما..."></textarea>
        </div>

        <img src="https://i.ibb.co/60j1ZR7p/IMG-7488.jpg" class="small-box" alt="صندوق صغير">
    </div>

    <script>
        const box = document.getElementById('box');
        const gameScreen = document.getElementById('game-screen');
        const winScreen = document.getElementById('win-screen');
        const textarea = document.getElementById('message-input');

        let attempts = 0;
        const maxAttempts = 8;

        // أحجام متدرجة (من كبير إلى صغير جداً)
        const sizes = [280, 235, 195, 160, 130, 105, 82, 58];

        function getRandomPosition() {
            const padding = 60;
            const maxX = window.innerWidth - sizes[attempts] - padding;
            const maxY = window.innerHeight - sizes[attempts] - padding * 1.5;

            const left = padding + Math.random() * maxX;
            const top = padding + Math.random() * maxY;

            return { left, top };
        }

        function startGame() {
            attempts = 0;
            box.style.width = sizes[0] + 'px';
            box.style.height = 'auto';
            
            const pos = getRandomPosition();
            box.style.left = pos.left + 'px';
            box.style.top = pos.top + 'px';
        }

        box.addEventListener('click', () => {
            attempts++;

            if (attempts >= maxAttempts) {
                // الانتقال إلى شاشة الرسالة
                gameScreen.style.opacity = '0';
                
                setTimeout(() => {
                    gameScreen.style.display = 'none';
                    winScreen.style.display = 'flex';
                    setTimeout(() => {
                        winScreen.style.opacity = '1';
                    }, 50);
                }, 650);
                return;
            }

            // تغيير الحجم والموقع
            box.style.width = sizes[attempts] + 'px';
            
            const newPos = getRandomPosition();
            box.style.left = newPos.left + 'px';
            box.style.top = newPos.top + 'px';

            // تأثير ضغط لطيف
            box.style.transform = 'scale(0.82)';
            setTimeout(() => box.style.transform = 'scale(1)', 180);
        });

        // بدء اللعبة
        window.onload = () => {
            startGame();
        };

        // تحسين تجربة الكتابة على الجوال
        textarea.addEventListener('focus', () => {
            textarea.style.height = '200px';
        });
    </script>
</body>
</html>
